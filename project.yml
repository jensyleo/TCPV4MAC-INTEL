name: TCPV4MAC
options:
  bundleIdPrefix: com.jensyleo
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"

packages:
  TCPV4MACCore:
    path: TCPV4MACCore

targets:
  TCPV4MAC:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: TCPV4MACCore
        product: TCPV4MACCore
    scheme:
      buildImplicitDependencies: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jensyleo.tcpv4mac
        PRODUCT_NAME: TCPV4MAC
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Non-sandboxed app (must spawn lsof + inspect other processes) →
        # distributed outside the Mac App Store. Sandbox intentionally NOT enabled.
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        # Ad-hoc "sign to run locally" for development builds.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright (C) 2026 Jensy Leonardo Martínez Cruz — GNU GPL v3.0"
